name: Generate Repo Cards

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/cards/**"
      - "profile-3d-contrib/**"
  schedule:
    - cron: "20 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-repo-cards
    steps:
      - uses: actions/checkout@v5
      - name: Generate cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/generate-repo-cards.py
      - name: Commit and push cards
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .github/cards
          if git diff --cached --quiet; then
            echo "No repo card changes."
          else
            git commit -m "chore: update repo cards"
            git push
          fi
